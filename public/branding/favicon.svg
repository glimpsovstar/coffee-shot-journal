<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <rect width="100%" height="100%" fill="#FAF6F0"/>
    <!-- Playful minimalist coffee mug forming a 'C' with a quirky personality -->
    <g transform="translate(40, 20)">
        <!-- Steam lines - fun, wiggly/abstract -->
        <path d="M 170,110 Q 185,80 170,50 Q 155,20 170,0" fill="none" stroke="#E05A47" stroke-width="16" stroke-linecap="round"/>
        <path d="M 230,110 Q 245,85 230,60 Q 215,35 230,10" fill="none" stroke="#E05A47" stroke-width="16" stroke-linecap="round"/>
        
        <!-- Main Cup Body forming a structured 'C' -->
        <path d="M 320,160 L 180,160 C 120,160 100,200 100,260 L 100,320 C 100,390 140,420 200,420 L 320,420" 
              fill="none" stroke="#2E1F16" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
              
        <!-- Fun oversized exaggerated handle (making it feel like a designer icon/snob vibe) -->
        <path d="M 315,210 C 390,210 400,260 380,290 C 360,315 330,310 315,310" 
              fill="none" stroke="#2E1F16" stroke-width="36" stroke-linecap="round"/>
              
        <!-- Little playful coffee snob 'wink' or sparkle detail inside -->
        <path d="M 190,270 L 210,290 M 210,270 L 190,290" fill="none" stroke="#E05A47" stroke-width="12" stroke-linecap="round"/>
        <circle cx="260" cy="280" r="12" fill="#2E1F16"/>
    </g>
</svg>
